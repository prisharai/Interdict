# Default policy shipped with Interdict.
#
# This policy is database-agnostic: it applies Interdict's structural guards,
# blast-radius simulation, and undo to ANY Postgres database without needing a
# per-table allowlist first. Tighten it per deployment by adding a `tables:`
# allowlist (default-deny) -- see policies/pagila.yaml for a fully locked-down
# example tuned to the demo dataset.
#
# Posture: fail closed for writes, fail open for reads; DDL is default-deny.

# enforce = block disallowed statements. observe = decide + log, but still run
# (shadow). Use observe to trial a policy against live traffic before enforcing.
mode: enforce

# Global kill-switch: when true, only reads are allowed.
read_only: false

# Multiple statements per request are a classic smuggling vector -> blocked.
allow_multi_statement: false

# Block reads/writes against pg_catalog / information_schema.
block_system_catalog: true

# Block bare UPDATE/DELETE (no WHERE) -- they would hit every row.
require_where_on_writes: true

# Auto-inject LIMIT on unbounded top-level SELECTs (guardrail, not a gate; a read
# is never blocked for lacking a LIMIT, only capped). null disables.
max_rows_read: 1000

# Sensitive columns, per table. A reference to one of these columns -- or a star
# select over the table -- is blocked. Empty by default: add your own, e.g.
#   users:
#     - password_hash
blocked_columns: {}

# Unsafe functions are blocked on top of a built-in default set (pg_sleep,
# advisory locks, lo_*, dblink, filesystem readers, ...). Add more here.
blocked_functions: []

# Block SELECT ... FOR UPDATE/SHARE, which takes row locks.
block_locking: true

# No `tables:` allowlist here: all tables are reachable, guarded by the rules
# above plus simulation/undo below. For default-deny table access, add:
#   tables:
#     allow: [orders, customers]

# DDL is default-deny. List tables on which schema changes (DROP/TRUNCATE/ALTER/
# CREATE INDEX/...) are explicitly permitted. Empty = no DDL allowed anywhere.
ddl:
  allow: []

# Blast-radius simulation (differentiator #1). OFF the normal path -- only a
# single-statement risky write is ever simulated, and only when enforcing.
# Preview never executes the proposed write. Simple UPDATE/DELETE statements
# use a read-only count; INSERT ... VALUES is counted from the parsed AST.
# `precise` is retained for configuration compatibility and is currently ignored.
simulation:
  enabled: true
  precise: true
  statement_timeout_ms: 1000
  lock_timeout_ms: 200
  confirm_over_rows: 1000     # writes touching >1k rows need explicit confirmation
  block_over_rows: 100000     # writes touching >100k rows are blocked outright

# Reversibility / instant undo (differentiator #2). Write path only -- a
# before-image of every reversible write is captured so it can be reverted with
# its action id. Production stores evidence in AGENT_CONTROL_DSN; `schema` names
# the destination schema and remains in the application DB only in development.
undo:
  enabled: true
  schema: adb_undo
  block_non_reversible: true
  require_agent_match: true
  max_capture_rows: 10000
  max_capture_bytes: 16777216

# Intent-mismatch detection (advisory). Compares the agent's stated_task to the
# statement's actual effect and flags contradictions. A HIGH mismatch (e.g. a
# "single record" task that would touch thousands of rows, or read-only language
# on a write) escalates to human confirmation -- it never blocks on its own. The
# optional LLM second opinion is async/out-of-band and OFF by default.
intent:
  enabled: true
  single_scope_max: 10      # a "single/specific" task shouldn't exceed this many rows
  bulk_threshold: 1000      # a scope-less task affecting more than this is noted
  confirm_on_high: true     # escalate HIGH mismatch to human confirmation
  llm_enabled: false
